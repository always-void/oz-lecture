<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>가입신청서</title>
    </head>

    <body>
        <header>
            <h1>회원 가입</h1>
            <nav>
                <ul>
                    <li><a href="#home">홈</a></li>
                    <li><a href="#register">회원가입</a></li>
                    <li><a href="#about">소개</a></li>
                </ul>
            </nav>
        <svg width="400" height="110">
            <!-- x, y는 시작 좌표 / width, height는 크기 -->
            <rect x="10" y="10" width="300" height="100" style="fill:blue; stroke:black; stroke-width:3;" >
        </svg>
        </header>

        <section>
            <h2>회원가입 양식</h2>
            <form action="#" method="POST">  <!-- 폼 시작 -->
                <div>
                    <div> <!--이름 입력-->
                        <label for="user-name">성명</label><br>
                        <input type="text" id="user-name" name="user_name" placeholder="이름을 입력하세요" required>
                    </div>
                    <div> <!-- 이메일 입력 -->
                        <br>
                        <label for="user-email">email</label><br>
                        <input type="email" id="user-email" name="user_email" placeholder="example@domain.com" title="올바른 이메일 형식을 입력해 주세요 (예: user@example.com)" required>
                        <!-- pattern="[a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,4}$" -->
                    </div>
                    <div> <!-- 비밀번호 설정 -->
                        <br>
                        <label for="user-password">비밀번호</label><br>
                        <input type="password" id="user-password" name="user_password" placeholder="패스워드를 입력하세요" required>
                        <br>
                        <label for="password-confirm">비밀번호 확인</label><br>
                        <input type="password" id="password-confirm" name="password_confirm" placeholder="비밀번호 재입력" required>
                    </div>
                    <div> <!-- 생일 입력 -->
                        <br>
                        <label for="user-birthdate">생년월일</label><br>
                        <input type="date" id="user-birthdate" name="user_birthdate" placeholder="생년월일을 선택하세요" required>
                        <!-- pattern="[0-9]{4}-[0-9]{2}-[0-9]{2}" -->
                    </div>
                    <div>
                        <br> <!-- 나이 입력 -->
                        <label for="user_age">나이</label><br>
                        <input type="number" id="user_age" name="age" placeholder="나이" min="18" max="100" required>
                    </div>
                    <div> <!-- 서비스 만족도 -->
                        <br>
                        <label for="ser_rat">서비스 만족도</label><br>
                        <input type="range" id="ser_rat" name="service_rating"  min="1" max="10">
                    </div>
                    <div> <!-- 성병 선택 -->
                        <br>
                        성별<br>
                        <input type="radio" id="gender-male" name="gender" value="male">
                        <label for="gender-male">남성</label>
                        <input type="radio" id="gender-female" name="gender" value="female">
                        <label for="gender-female">여성</label>
                        <input type="radio" id="gender-other" name="gender" value="other">
                        <label for="gender-other">기타</label>
                    </div>
                    <div> <!-- 관심사 설정 -->
                        <br>
                        관심사 선택<br>
                        <input type="checkbox" id="interests-coding" name="interests" value="Coding">
                        <label for="interests-coding">코딩</label>
                        <input type="checkbox" id="interests-gaming" name="interests" value="Gaming">
                        <label for="interests-gaming">게임</label>
                        <input type="checkbox" id="interests-reading" name="interests" value="Reading">
                        <label for="interests-reading">독서</label>
                    </div>
                    <div> <!-- 국가 설정 -->
                        <br>
                        <label for="user-country">국가선택</label><br>
                        <select id="user-country" name="country">
                            <option value="southkorea">한국</option>
                            <option value="usa">미국</option>
                            <option value="japan">일본</option>
                            <option value="china">중국</option>
                            <option value="uk">영국</option>
                        </select>
                    </div>
                    <div> <!-- 입력 양식 전송 or 초기화 -->
                        <br>
                        <button type="submit">제출</button>
                        <button type="reset">초기화</button>
                    </div>
                </div>
            </form>
        </section>
        <artice>
            <p>
                왜 가입해야 하나요? 가입하시면 오직 회원님만을 위한 특별한 기능들을 이용하실 수 있습니다.
            </p>
            <canvas>
                <!-- 현재 서비스의 실시간 가입자 수 추이를 출력합니다. -->
            </canvas>
        </artice>
        <aside>
            <ul>
                <li><a href="#registertip">등록 팁</a></li>
                <li><a href="#contactsupport">고객센터</a></li>
            </ul>
            <video src="./media/sample.mp4" controls width="300"></video>
        </aside>
        <hr>
        <footer>
            <p>&copy; All rights reserved.</p>
            <!-- 이메일 링크: mailto를 사용하면 바로 메일 창이 뜹니다 -->
            <a href="mailto:support@example.com">support@example.com</a>
        </footer>

    </body>

</html>
